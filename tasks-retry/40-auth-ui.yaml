prompt: |
  ## Task: Create login/register modal for EcoTrace

  Backend already works:
  - POST /api/auth/register { nickname, password } вҶ’ { token, user }
  - POST /api/auth/login { nickname, password } вҶ’ { token, user }
  - GET /api/auth/me (Authorization: Bearer <token>) вҶ’ { user }
  - api-adapter.js already exports: register(), login(), getMe(), logout(), getToken(), setToken()

  ### Changes needed:

  1. Create `new-site/public/assets/pages/auth.js` вҖ” Vue component with:
     - Modal overlay with login/register tabs
     - Register form: nickname (2-20 chars), password (min 4 chars), confirm password
     - Login form: nickname, password
     - Call `register()` or `login()` from api-adapter.js
     - On success: store token (already done by api-adapter), emit 'auth-success' event, close modal
     - Show error messages from API (e.g. "иҜҘжҳөз§°е·Іиў«жіЁеҶҢ", "жҳөз§°жҲ–еҜҶз Ғй”ҷиҜҜ")
     - Chinese UI labels, green-leaf color scheme (leaf-500 = #3f9451)

  2. Add to `new-site/public/assets/components.js`:
     - Export `AuthModal` component that wraps auth.js
     - Show/hide via v-model boolean

  3. Update `new-site/public/assets/app.js`:
     - Add auth state: `isAuthenticated` reactive, `currentUser` from API
     - On app mount: call `getMe()` to restore session from localStorage token
     - If token expired вҶ’ show AuthModal
     - Add Navbar "зҷ»еҪ•/жіЁеҶҢ" button when not authenticated
     - Add Navbar user display + "йҖҖеҮә" button when authenticated

  4. Update `new-site/public/assets/components.js` Navbar:
     - Show user avatar + nickname when logged in
     - Show "зҷ»еҪ•" button when not logged in
     - On logout: call `logout()`, clear state

  **Verification:**
  - Open site вҶ’ see "зҷ»еҪ•" in navbar
  - Click вҶ’ register new user (e.g. "testuser", password "1234")
  - Auto-login, see nickname in navbar
  - Refresh page вҶ’ session restored from localStorage token
  - Logout вҶ’ back to "зҷ»еҪ•" button
