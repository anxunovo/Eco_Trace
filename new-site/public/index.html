    <script>
      function isStaticDemoApiMessage(message) {
        return String(message || '').includes('Static demo mode: API disabled');
      }
      window.addEventListener('error', (event) => {
        if (isStaticDemoApiMessage(event.message)) return;
        const app = document.getElementById('app');
        if (!app || !app.textContent.includes('加载中')) return;
        app.innerHTML = '<main><div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;color:#b91c1c;font:14px system-ui;">前端模块加载失败：' + String(event.message || '未知错误') + '</div></main>';
      });
      window.addEventListener('unhandledrejection', (event) => {
        if (isStaticDemoApiMessage(event.reason?.message || event.reason)) return;
        const app = document.getElementById('app');
        if (!app || !app.textContent.includes('加载中')) return;
        const message = event.reason?.message || event.reason || '未知错误';
        app.innerHTML = '<main><div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;color:#b91c1c;font:14px system-ui;">前端启动失败：' + String(message) + '</div></main>';
      });
    </script>

    <!-- Service Worker registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          const isLocalDemo = ['127.0.0.1', 'localhost', '[::1]'].includes(location.hostname);
          if (isLocalDemo) {
            navigator.serviceWorker.getRegistrations()
              .then(registrations => Promise.all(registrations.map(reg => reg.unregister())))
              .then(() => caches?.keys ? caches.keys() : [])
              .then(keys => Promise.all((keys || []).map(key => caches.delete(key))))
              .catch(() => {});
          } else {
            navigator.serviceWorker.register('/sw.js').catch(() => {});
          }
        });
      }
    </script>
