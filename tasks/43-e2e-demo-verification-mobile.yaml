  4. **Mobile-specific verification**:
     - Test on iPhone (use Chrome DevTools device emulation or real device)
     - Test on Android (use Chrome DevTools device emulation or real device)
     - Verify touch interactions work correctly
     - Check mobile viewport handling
     - Verify mobile navigation (bottom nav, hamburger menu, etc.)
     - Test mobile-specific UI components (fixed CTA buttons, mobile modals)

  5. **Food listing verification on mobile**:
     - Publish a food item
     - Verify safety notices appear on mobile
     - Check auto-expiration logic (if implemented)

  6. **Console error check**:
     - Open browser dev tools (Chrome remote debugging if using real device)
     - Walk through demo path
     - Verify no console errors or warnings

  ### Verification
  1. All steps in demo path complete successfully on mobile
  2. BUG-001 and BUG-002 fixes confirmed working on mobile
  3. All carbon labels have "预计" or "估算" prefix
  4. Mobile layout renders correctly on iOS and Android
  5. Touch interactions work correctly
  6. Zero console errors during demo walkthrough

  ### Deliverables
  - Document mobile browser compatibility results (iOS Safari, Chrome Android)
  - Report any mobile-specific issues found in `BUGS.md` if new bugs discovered
