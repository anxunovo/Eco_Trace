  ## Task: Implement Dual-Channel Carbon Estimation Engine

  This task depends on Task 01 (foundation). Assume `netlify/functions/_lib/` exists with `db.js`.

  ### Create `netlify/functions/_lib/carbon-engine.js`

  Pure function module for carbon estimation. Must work as both:
  1. Standalone import by API endpoints
  2. Testable with direct function calls

  ```javascript
  /**
   * Estimate carbon savings for a completed listing.
   *
   * Dual-channel model:
   * - Channel 1 (per_kg): weight_kg × emission_factor × substitution_rate
   * - Channel 2 (per_item): emission_factor × substitution_rate
   *
   * Emission factors sourced from CLCD (China), ecoinvent (international), IPCC (food).
   * All results rounded to 1 decimal place.
   */

  export function estimateCarbon({ category, weightKg, foodType, foodWeightKg, coefficients }) {
    // coefficients is array from carbon_coefficients table
    // Find the active coefficient for this category

    if (category === 'FOOD' && foodType && foodWeightKg) {
      // Food uses subcategory-specific factors
      const coeff = coefficients.find(c =>
        c.category === 'FOOD' && c.subcategory === foodType && !c.effective_to
      );
      if (!coeff) return { kg: 0, source: 'none', note: 'No food coefficient found' };
      const kg = round1(foodWeightKg * coeff.factor * coeff.substitution_rate);
      return { kg, source: coeff.source, note: coeff.note, coefficientId: coeff.id };
    }

    const coeff = coefficients.find(c =>
      c.category === category && !c.subcategory && !c.effective_to
    );
    if (!coeff) return { kg: 0, source: 'none', note: 'No coefficient found' };

    if (coeff.mode === 'per_kg') {
      const w = weightKg || coeff.default_weight_kg || 1.0;
      const kg = round1(w * coeff.factor * coeff.substitution_rate);
      return { kg, source: coeff.source, note: coeff.note, coefficientId: coeff.id };
    }

    // per_item
    const kg = round1(coeff.factor * coeff.substitution_rate);
    return { kg, source: coeff.source, note: coeff.note, coefficientId: coeff.id };
  }

  function round1(n) { return Math.round(n * 10) / 10; }
  ```

