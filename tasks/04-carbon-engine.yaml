  ### Create `netlify/functions/carbon.mjs`

  Endpoint: `GET/POST /api/carbon`
  - `config.path = '/api/carbon'`
  - POST: `{ category, weightKg, foodType, foodWeightKg }` → returns `{ success, data: { kg, source, note } }`
  - GET: returns dashboard aggregation — total carbon saved, by category, recent records

  ### Verification

  After implementation:
  - `_lib/carbon-engine.js` exports `estimateCarbon()` as pure function
  - `_lib/seed-carbon-coefficients.js` exports 12 coefficient rows
  - `carbon.mjs` handles POST estimation and GET dashboard
  - `estimateCarbon({ category: 'BOOKS', weightKg: 1.0, coefficients: [...] })` returns correct value
  - All results rounded to 1 decimal place
  - Food subcategories handled separately from main categories
