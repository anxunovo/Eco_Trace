prompt: |
  ## Task: End-to-End demo verification on production

  ### Context
  - Phase 1-3 are complete (deploy, auth, frontend integration)
  - BUG-001 (AI re-recognition cache) and BUG-002 (publish redirect to /listings/undefined) are fixed
  - Production site: https://stu-eco-trace.netlify.app
  - Need to verify the complete demo path works on production for competition presentation

  ### What to do

  1. **Complete demo path verification** - Walk through the full user journey:
     - Register a new user account
     - Browse listings on home page
     - Publish a new item with AI analysis
     - View listing details
     - Submit interest
     - Complete the item transfer
     - View dashboard with carbon stats
     - Verify mobile layout (use browser dev tools to simulate mobile)

  2. **Verify BUG fixes**:
     - Test BUG-001 fix: Upload item A → upload item B → verify AI shows B's content (not A)
     - Test BUG-002 fix: Publish new item → verify redirects to correct `/listings/<id>` (not `/listings/undefined`)
     - Verify the published item appears in listings list

  3. **Carbon label verification**:
     - Check all carbon values show "预计" or "估算" prefix
     - Verify carbon source badges display correctly (AI vs formula)

  4. **Food listing verification**:
     - Publish a food item
     - Verify safety notices appear
     - Check auto-expiration logic (if implemented)

  5. **Console error check**:
     - Open browser dev tools
     - Walk through demo path
     - Verify no console errors or warnings

  6. **Mobile layout verification**:
     - Use Chrome DevTools device emulation (iPhone, Android)
     - Test all key flows on mobile viewport
     - Verify responsive design works correctly

  ### Verification
  1. All steps in demo path complete successfully
  2. BUG-001 and BUG-002 fixes confirmed working
  3. All carbon labels have "预计" or "估算" prefix
  4. Food listings show safety notices
  5. Zero console errors during demo walkthrough
  6. Mobile layout renders correctly on iOS and Android emulation

  ### Deliverables
  - Update `STATE.md` Phase 4 status to "complete"
  - Document any issues found in `BUGS.md` if new bugs discovered
  - Create a demo checklist markdown file if useful for future reference
