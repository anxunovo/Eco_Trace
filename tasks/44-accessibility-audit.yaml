prompt: |
  ## Task: Accessibility audit on production site

  ### Context
  - Phase 1-3 are complete (deploy, auth, frontend integration)
  - Production site: https://stu-eco-trace.netlify.app
  - Need to ensure the site is accessible for users with disabilities
  - This can run in parallel with E2E verification tasks

  ### What to do

  1. **Automated accessibility testing**:
     - Use axe DevTools or similar tool to scan the production site
     - Test all major pages: home, listings, publish, listing-detail, impact, me, admin
     - Identify and document accessibility violations

  2. **Keyboard navigation testing**:
     - Navigate the site using only keyboard (Tab, Enter, Escape, Arrow keys)
     - Verify all interactive elements are keyboard accessible
     - Check focus indicators are visible
     - Test modal dialogs can be closed with Escape key

  3. **Screen reader testing**:
     - Test with NVDA (Windows) or VoiceOver (Mac)
     - Verify page structure is announced correctly
     - Check form labels and error messages are accessible
     - Verify images have appropriate alt text
     - Test dynamic content updates are announced

  4. **Color contrast verification**:
     - Check all text meets WCAG AA contrast requirements (4.5:1 for normal text, 3:1 for large text)
     - Verify interactive elements have sufficient contrast
     - Check that color is not the only way to convey information

  5. **Form accessibility**:
     - Verify all form fields have associated labels
     - Check error messages are associated with form fields
     - Test form validation provides clear feedback
     - Verify required fields are indicated

  6. **Mobile accessibility**:
     - Test touch target sizes are at least 44x44 pixels
     - Verify content is readable when zoomed
     - Check that gestures can be performed with alternative inputs

  ### Verification
  1. Zero critical accessibility violations (axe DevTools)
  2. Keyboard navigation works for all interactive elements
  3. Screen reader announces content correctly
  4. Color contrast meets WCAG AA standards
  5. Forms are fully accessible
  6. Mobile touch targets meet minimum size requirements

  ### Deliverables
  - Accessibility audit report with findings and recommendations
  - Prioritized list of accessibility issues to fix
  - Update `BUGS.md` with any critical accessibility bugs found
