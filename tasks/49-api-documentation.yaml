title: "EcoTrace: API documentation"
source: "sources/github/Yuuqq/Eco_Trace"
branch: "master"
autoMode: "AUTO_CREATE_PR"

prompt: |
  ## Task: Create comprehensive API documentation

  ### Context
  - Phase 1-3 are complete (deploy, auth, frontend integration)
  - All API endpoints are implemented and tested
  - Need API documentation for future development and external integration
  - This can run in parallel with other audits

  ### What to do

  1. **Create API documentation structure**:
     - Create `docs/API.md` or use OpenAPI/Swagger format
     - Document all API endpoints with methods, paths, parameters

  2. **Document authentication**:
     - Explain token-based authentication flow
     - Document how to obtain and use auth tokens
     - Include example requests with authentication

  3. **Document public endpoints**:
     - GET /api/listings - List all listings with filters
     - GET /api/listing/:id - Get single listing details
     - GET /api/dashboard - Get aggregated carbon stats

  4. **Document protected endpoints**:
     - POST /api/listings/create - Create new listing
     - POST /api/listings/update - Update existing listing
     - POST /api/listings/delete - Delete listing
     - POST /api/listings/:id/complete - Complete item transfer
     - POST /api/interests - Submit interest in listing
     - POST /api/auth/register - User registration
     - POST /api/auth/login - User login
     - GET /api/auth/me - Get current user info

  5. **Document AI endpoint**:
     - POST /api/ai/analyze - Image analysis for listing suggestions
     - Include request/response examples
     - Document fallback behavior when API unavailable

  6. **Document error responses**:
     - List common error codes and messages
     - Include examples of error responses
     - Document rate limiting behavior

  7. **Add code examples**:
     - cURL examples for each endpoint
     - JavaScript fetch examples
     - Python requests examples

  ### Verification
  1. All API endpoints documented
  2. Authentication flow clearly explained
  3. Request/response examples for each endpoint
  4. Error handling documented
  5. Code examples provided in multiple languages

  ### Deliverables
  - Complete API documentation file (API.md or OpenAPI spec)
  - Commit to docs/ directory
