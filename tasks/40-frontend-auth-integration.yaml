  **Update MobileTabBar**: The "我的" tab should link to `/me` when authenticated, or `/auth` when not. The publish "+" button should also check auth.

  #### 5. Modify: `new-site/public/assets/pages/me.js`

  - Remove the "切换身份" demo feature (the `switchTo` function, `showSwitch`, the user list dropdown)
  - Show real user data from `authState.user` or `currentUser`
  - Add a "退出登录" button that calls `logout()` + `clearAuth()`
  - Import `isAuthenticated`, `authState`, `clearAuth` from store.js
  - Import `logout` from api-adapter.js
  - If not authenticated, show a prompt to login with link to `/auth`

  ### Design Rules
  - Use the EXACT same visual language: `rounded-2xl`, `bg-leaf-500`, `text-leaf-700`, `border border-slate-200`
  - Mobile responsive: use `useDevice()` hook and `isLayoutMobile` as other pages do
  - Keep all existing functionality — auth is additive
  - The old localStorage/seed-user system remains as fallback when API is unavailable
  - Do NOT remove the `state.users` array or seed data loading — it's still needed for fallback

